<div class="result-container" [class.sweep]="sweepMode()">
  <canvas #resultCanvas></canvas>
</div>

@if (state() === 'complete') {
  <div class="result-actions">
    <button class="btn-download" (click)="download()">Download</button>
    @if (auth.isAuthenticated()) {
      <button class="btn-save" (click)="save()" [disabled]="saveState() === 'saving' || saveState() === 'saved'">
        @switch (saveState()) {
          @case ('saving') { Saving... }
          @case ('saved') { Saved }
          @case ('error') { Retry }
          @default { Save }
        }
      </button>
    }
  </div>
}
