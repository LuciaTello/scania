<div class="result-container">
  <canvas #resultCanvas></canvas>
</div>

@if (state() === 'complete' && !hideActions()) {
  <div class="result-actions">
    <button class="btn-save" (click)="saveEverywhere()" [disabled]="saveState() === 'saving' || saveState() === 'saved'">
      @switch (saveState()) {
        @case ('saving') { Saving... }
        @case ('saved') { Saved ✓ }
        @case ('error') { Retry }
        @default { Save }
      }
    </button>
  </div>
}
