<div class="scanner-layout" [class.sweep-mode]="mode() === 'sweep'">
  <section class="panel source-area">
    <h2>Video Source</h2>
    <app-video-source
      [slitPosition]="slitPosition()"
      [slitOrientation]="orientation()"
      [lineWidth]="lineWidth()"
      [sweepPosition]="slitScan.sweepPosition()"
      (videoReady)="onVideoReady($event)"
    />
  </section>

  <section class="panel result-area" [class.sweep-overlay]="mode() === 'sweep'">
    <h2>Result</h2>
    <app-scan-result
      [state]="state()"
      [sweepMode]="mode() === 'sweep'"
      (canvasReady)="onCanvasReady($event)"
    />
  </section>

  <section class="panel controls-area">
    <h2>Controls</h2>
    <app-slit-controls
      [(orientation)]="orientation"
      [(mode)]="mode"
      [(position)]="position"
      [(lineWidth)]="lineWidth"
      [(speed)]="speed"
      [(outputSize)]="outputSize"
      [state]="state()"
      (start)="onStart()"
      (stop)="onStop()"
      (resetScan)="onReset()"
    />
  </section>
</div>
